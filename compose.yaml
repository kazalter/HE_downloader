services:
  aria2:
    build: ./aria2
    container_name: he_downloader_aria2
    restart: unless-stopped
    # 以宿主用户身份跑，下载的文件归你（默认 1000:1000），不再是 root 占着删不动。
    user: "${PUID:-1000}:${PGID:-1000}"
    # RPC 参数显式注入；下完即停、不做种（seed-time=0）。
    command:
      - --enable-rpc
      - --rpc-listen-all=true
      - --rpc-allow-origin-all=true
      - --rpc-listen-port=6800
      - --rpc-secret=${ARIA2_RPC_SECRET}
      - --dir=/downloads
      - --continue=true
      - --max-concurrent-downloads=3
      - --disk-cache=64M
      - --auto-file-renaming=false
      - --allow-overwrite=false
      - --listen-port=6888
      - --dht-listen-port=6888
      - --seed-time=0
      - --bt-stop-timeout=120
    volumes:
      - ${DOWNLOAD_DIR:-./downloads}:/downloads
      # 媒体库盘：HE Manager 推收藏时 dest_dir 走 /mnt/hdd/...，aria2 直接下进库。
      # 主机端用 uid=1000 挂载，aria2(user 1000) 可写。盘没挂时此路径为空目录，无害。
      - /mnt/hdd:/mnt/hdd
    ports:
      - "${ARIA2_RPC_PORT:-6800}:6800"
      - "6888:6888"
      - "6888:6888/udp"

  gateway:
    build: ./gateway
    container_name: he_downloader_gateway
    restart: unless-stopped
    environment:
      - ARIA2_RPC_URL=http://aria2:6800/jsonrpc
      - ARIA2_RPC_SECRET=${ARIA2_RPC_SECRET}
      - GATEWAY_API_TOKEN=${GATEWAY_API_TOKEN:-}
      - DOWNLOAD_DIR=/downloads
      - GATEWAY_DB_PATH=/data/gateway.db
      # 从 HE 收藏导入：网关代理 HE Manager（留空则面板不显示 HE 收藏入口）。
      - HE_MANAGER_URL=${HE_MANAGER_URL:-}
      - HE_MANAGER_TOKEN=${HE_MANAGER_TOKEN:-}
    volumes:
      - ${DOWNLOAD_DIR:-./downloads}:/downloads
      # 任务库（SQLite）持久化：重启不丢。
      - ./data/gateway:/data
      # 面板 HTML 热挂载：改完 git pull + 刷新浏览器即生效，免 rebuild。
      # （只挂这一个文件，不影响镜像里构建时拉的 vue.global.prod.js。）
      - ./gateway/app/static/index.html:/app/app/static/index.html
    ports:
      - "${GATEWAY_PORT:-8011}:8000"
    depends_on:
      - aria2
